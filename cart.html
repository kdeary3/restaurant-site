<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Steaming Bulldog KBBQ</title>

    <!--Bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!--Font Awesome-->
    <script src="https://kit.fontawesome.com/7b5569b04c.js" crossorigin="anonymous"></script>

    <!--Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Hammersmith+One&display=swap" rel="stylesheet">

    <!--Styles.css-->
    <link rel="stylesheet" href="styles.css">

</head>

<body>

<nav class="navbar navbar-expand-lg bg-body-tertiary sticky-top shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html">The Steaming Bulldog KBBQ</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="index.html">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="menu.html">Menu</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="cart.html">Cart</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="reservations.html">Reservations</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div id="alert-placeholder" class="fixed-top container d-flex flex-column align-items-center" style="top: 80px; z-index: 1050; pointer-events: none;">
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 d-flex justify-content-center">
            <a href="index.html">
                <img src="images/logo.png" class="img-fluid" alt="Steaming Bulldog logo" style="height:300px;">
            </a>
        </div>
    </div>
</div>


<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-sm-10 text-center">

            <h1>Cart:</h1>
            <ul id="items-in-cart" class="list-group shadow-sm"></ul>
            <div id="customer-cost"></div>
            <div>
                <br>
                <a class="btn btn-primary checkout-btn" href="menu.html">Back to Menu</a>

                <!-- Button trigger modal -->
                <button type="button" class="btn btn-danger clear-cart" data-bs-toggle="modal" data-bs-target="#exampleModal">
                    <i class="fa-solid fa-trash-can me-2"></i>Cancel Order
                </button>

                <!-- Modal -->
                <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title" id="exampleModalLabel">Cancel Order</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                            </div>
                            <div class="modal-body" id="cancel-modal-body">
                                Are you sure you want to cancel your order?
                            </div>
                            <div class="modal-footer" id="cancel-modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Wait, not yet</button>
                                <button type="button" class="btn btn-danger confirm-clear">Yes, Cancel Order</button>
                            </div>
                        </div>
                    </div>
                </div>


                <!-- Button trigger modal -->
                <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#checkoutModal">
                    <i class="fa-solid fa-check me-2"></i>Submit Order
                </button>

                <!-- Modal -->
                <div class="modal fade" id="checkoutModal" tabindex="-1" aria-hidden="true">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title">Confirm Submission</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body text-start" id="checkout-modal-body">
                                Ready to submit your order?
                            </div>
                            <div class="modal-footer" id="checkout-modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Wait, not yet</button>
                                <button type="button" class="btn btn-success confirm-checkout">Yes, Submit Order</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
