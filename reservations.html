</head>
<body>

<nav class="navbar navbar-expand-lg bg-body-tertiary sticky-top shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html">The Steaming Bulldog KBBQ</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="index.html">Home</a>

<div id="alert-placeholder" class="fixed-top container d-flex flex-column align-items-center" style="top: 80px; z-index: 1050; pointer-events: none;"></div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 d-flex justify-content-center">
            <a href="index.html">
                <img src="images/logo.png" class="img-fluid" alt="Steaming Bulldog logo" style="height:300px;">
            </a>
        </div>
    </div>
</div>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-sm-10 text-center">
            <div class="center">
                <p>Reservations are at request only. Fill out the form below to book a table.</p>
            </div>

            <div id="reservation-container">
                <form id="res-form" class="reservation-form">
                <label>Name:
                    <input type="text" name="name" placeholder=" John Smith">
                </label>
                <label> Email:
                    <input type="email" name="email" placeholder=" jsmith@email.com">
                </label>
                <label> Party Size (max 8):
                    <input type="number" name="party_size" placeholder="2" min="1" max="8">
                </label>
                <label> Date:
                    <input type="date" name="date">
                </label>
                <label> Time (30 min increments):
                    <input type="time" name="reservation_time">
                </label>
                    <fieldset>
                    <label class="label-padding">
                        Seating Preference:
                        <br><br>
                        <input type="radio" name="seating_preference" value="Dog Kennel" checked> Dog Kennel
                    </label>
                    <label>
                        <input type="radio" name="seating_preference" value="Indoor"> Indoor
                    </label>
                    <label>
                        <input type="radio" name="seating_preference" value="Outdoor"> Outdoor
                    </label>
                </fieldset>
                <label class="label-padding"> Dietary Restrictions: <br>
                    <textarea name="dietary_restrictions" rows="4" cols="40" placeholder="  Enter any dietary restrictions."></textarea>
                </label>
                <label> Sign up for newsletter?:
                    <input type="checkbox" name="newsletter"> Yes
                </label>

                <button type="submit" class="btn btn-success">Submit Reservation</button>
                <button type="reset" class="btn btn-danger">Reset</button>
                </form>
            </div>
        </div>
    </div>
</div>


<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
