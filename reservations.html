<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Steaming Bulldog KBBQ</title>

    <!--Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Hammersmith+One&display=swap" rel="stylesheet">

    <!--Styles.css-->
    <link rel="stylesheet" href="styles.css">

</head>
<body>

<a href="index.html" class="center">
    <img src="images/logo.png" alt="The Steaming Bulldog logo" height="300">
</a>

<div class="center">
    <h1>The Steaming Bulldog KBBQ - "Engineered for Flavor"</h1>
</div>


<nav class="navbar">
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="reservations.html">Book a Reservation</a></li>
    </ul>
</nav>

<div class="center">
    <p>Reservations are at request only. Fill out the form below to book a table.</p>
</div>

<div class="center">
    <form action="/admin/users" method="GET">
    <label>Name:
        <input type="text" maxlength="20" name="name" required>
    </label>
    <label> Email:
        <input type="email" name="email" required>
    </label>
    <label> Party Size (max 8):
        <input type="number" min="1" max="8" name="party_size">
    </label>
    <label> Date:
        <input type="date" name="date" required>
    </label>
    <label> Time (30 min increments):
        <input type="time" name="reservation_time" step="1800" min="12:00" max="23:00" required>
    </label>

        <fieldset>
            <legend>Seating Preference:</legend>
        <label class="label-padding">
            <input type="radio" name="seating_preference" value="Dog Kennel" checked> Dog Kennel
        </label>
        <label>
            <input type="radio" name="seating_preference" value="Indoor"> Indoor
        </label>
        <label>
            <input type="radio" name="seating_preference" value="Outdoor"> Outdoor
        </label>
    </fieldset>
    <label class="label-padding">
        <textarea name="dietary_restrictions" rows="4" cols="40" maxlength="30">Enter any dietary restrictions.</textarea>
    </label>
    <label> Sign up for newsletter?:
        <input type="checkbox" name="newsletter"> Yes
    </label>


    <button type="submit">Submit Reservation</button>
    <button type="reset">Reset</button>
    </form>
</div>

</body>
</html>
